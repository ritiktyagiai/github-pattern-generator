<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>GitHub Pattern Generator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6363142267367412"
     crossorigin="anonymous"></script>
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="topbar">
    <div class="logo">
      <img src="assets/logo.jpg" class="header-logo" alt="Logo">
      <span class="logo-text">ritiktyagiai</span>
    </div>

    <nav class="nav">
      <a href="index.html" class="active">🎨 Draw first, Commit later.</a>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
      </button>
    </nav>
  </header>

  <!-- ================= PAGE (GRID BACKGROUND) ================= -->
  <main class="page-wrapper">

    <!-- ================= DRAW CARD ================= -->
    <div class="card">

      <div class="card-header">
        <h2>💠 GitHub Pattern → pattern.json</h2>

        <a class="star-btn" href="https://github.com/aurafarmerone/github-contribution-graph-hack" target="_blank">
          ⭐ Star on GitHub
        </a>
      </div>

      <p class="hint">
        <strong>✍🏻 Unleash Your Creativity with Every Dot:</strong><br>
        <span class="instruction-line"><img src="assets/mouse-left.svg" class="mouse-icon" alt="Left Click"> <b>Left
            Click → Add</b> <span class="demo-cell filled"></span></span><br>
        <span class="instruction-line"><img src="assets/mouse-right.svg" class="mouse-icon" alt="Right Click"> <b>Right
            Click → Remove</b> <span class="demo-cell empty"></span></span>
      </p>

      <!-- Month labels -->
      <div class="months">
        <span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span>
        <span>May</span><span>Jun</span><span>Jul</span><span>Aug</span>
        <span>Sep</span><span>Oct</span><span>Nov</span><span>Dec</span>
      </div>

      <div class="grid-wrapper">
        <div class="days">
          <span>Mon</span><span>Tue</span><span>Wed</span>
          <span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
        </div>

        <div id="grid"></div>
      </div>

      <!-- Buttons -->
      <div class="actions">
        <button id="download">Download pattern.json</button>
        <button id="reset" class="reset">Reset</button>
      </div>

    </div>

  </main>

  <!-- ================= FOOTER ================= -->
  <footer class="footer">
    <p style="margin-bottom: 10px; font-weight: bold;">
    </p>
    <div class="socials">
      <a href="https://github.com/ritiktyagiai" target="_blank"><i class="fab fa-github"></i></a>
      <a href="https://www.linkedin.com/in/ritiktyagiai/" target="_blank"><i class="fab fa-linkedin"></i></a>
      <a href="https://leetcode.com/u/ritiktyagiai" target="_blank"><i class="fas fa-code"></i></a>
    </div>
    <p style="margin-top: 20px;">Made with ❤️ by <strong>Ritik Tyagi</strong></p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
